app = "reporadar"
primary_region = "sin"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  LOG_LEVEL = "INFO"

[[mounts]]
  source = "reporadar_data"
  destination = "/root/.reporadar"

[http_service]
  internal_port = 8080
  force_https = true

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1